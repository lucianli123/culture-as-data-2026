name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Layer 1 — do the pins resolve?
        run: python tools/check_compat.py

      - name: Site/slides generators match the design docs and generated files
        run: python tools/check_sync.py

      - name: Site builds
        run: python tools/build_site.py

      - name: Layer 2 — execute every notebook headless (tiny, offline, key-free)
        run: |
          python -m pip install -q nbclient nbconvert jupyter ipykernel \
            pandas numpy scikit-learn matplotlib pillow networkx vaderSentiment
          bash tools/run_notebooks.sh --local

      # The faithful run inside Google's Colab base image (tools/run_notebooks.sh --docker)
      # is heavier and runs on a schedule / manually, not per-push.
